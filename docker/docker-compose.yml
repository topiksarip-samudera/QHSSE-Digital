version: '3.9'

services:
  # ─── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: qhsse-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: qhsse_db
      POSTGRES_USER: qhsse
      POSTGRES_PASSWORD: qhsse_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U qhsse -d qhsse_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: qhsse-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO (S3-compatible storage) ────────────────────
  minio:
    image: minio/minio:latest
    container_name: qhsse-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: qhsse_minio
      MINIO_ROOT_PASSWORD: qhsse_minio_secret
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO Client (auto-create bucket) ───────────────
  minio-init:
    image: minio/mc:latest
    container_name: qhsse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 qhsse_minio qhsse_minio_secret;
      mc mb --ignore-existing local/qhsse-files;
      mc anonymous set download local/qhsse-files;
      echo 'MinIO bucket created successfully';
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
